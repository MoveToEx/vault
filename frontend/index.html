<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/safe.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vault</title>
    <style>
      :root {
        color-scheme: light dark;
        --loading-background: #ffffff;
        --loading-foreground: #171717;
        --loading-muted: #6b7280;
        --loading-border: #e5e7eb;
        --loading-ring: #171717;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --loading-background: #171717;
          --loading-foreground: #fafafa;
          --loading-muted: #a3a3a3;
          --loading-border: rgba(255, 255, 255, 0.12);
          --loading-ring: #fafafa;
        }
      }

      body {
        margin: 0;
        background: var(--loading-background);
      }

      .app-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(
            180deg,
            color-mix(in srgb, var(--loading-border) 44%, transparent),
            transparent 32%
          ),
          var(--loading-background);
        color: var(--loading-foreground);
      }

      .app-loading__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.5rem;
        text-align: center;
      }

      .app-loading__mark {
        width: 4rem;
        height: 4rem;
        border: 1px solid var(--loading-border);
        border-radius: 1rem;
        display: grid;
        place-items: center;
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.08);
      }

      .app-loading__mark img {
        width: 2.25rem;
        height: 2.25rem;
        object-fit: cover;
        image-rendering: pixelated;
      }

      .app-loading__bar {
        position: relative;
        width: min(14rem, 70vw);
        height: 0.25rem;
        overflow: hidden;
        border-radius: 999px;
        background: var(--loading-border);
      }

      .app-loading__bar::after {
        position: absolute;
        inset: 0;
        width: 45%;
        border-radius: inherit;
        background: var(--loading-ring);
        animation: loading-slide 1.1s ease-in-out infinite;
        content: "";
      }

      @keyframes loading-slide {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(230%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-loading__bar::after {
          animation: none;
          transform: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="app-loading" aria-busy="true" aria-live="polite">
        <div class="app-loading__content">
          <div class="app-loading__mark" aria-hidden="true">
            <img src="/safe.jpg" alt="" />
          </div>
          <div class="app-loading__bar" aria-hidden="true"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
